<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extreme Unit</title>

<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    .header, .footer {
        background-color: red;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 80px;
    }

    .hero {
        background: black;
        color: white;
        text-align: center;
        padding: 50px 20px;
    }

    .features {
        display: flex;
        gap: 20px;
        padding: 20px;
        background: #f5f5f5;
        flex-wrap: wrap;
        justify-content: center;
    }

    .feature {
        width: 300px;
        padding: 20px;
        background: white;
        border: 1px solid #ddd;
        border-radius: 10px;
    }

    .footer {
        margin-top: auto;
    }
</style>
</head>

<body>

<script type="module" src="script.js"></script>
   <div id="content"></div>

</body>
</html>
